version: '3.9'

services:

  app:
    build: .
    container_name: learnforward_app
    restart: unless-stopped
    env_file: .env
    volumes:
      - storage:/var/www/html/storage
    depends_on:
      - mysql
      - redis
    networks:
      - learnforward

  nginx:
    image: nginx:alpine
    container_name: learnforward_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
      - storage:/var/www/html/storage:ro
    depends_on:
      - app
    networks:
      - learnforward

  mysql:
    image: mysql:8.0
    container_name: learnforward_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - learnforward

  redis:
    image: redis:7-alpine
    container_name: learnforward_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - learnforward

  worker:
    build: .
    container_name: learnforward_worker
    restart: unless-stopped
    command: php artisan queue:work redis --sleep=3 --tries=3 --queue=default,completions
    env_file: .env
    volumes:
      - storage:/var/www/html/storage
    depends_on:
      - mysql
      - redis
    networks:
      - learnforward

volumes:
  mysql_data:
  redis_data:
  storage:

networks:
  learnforward:
    driver: bridge